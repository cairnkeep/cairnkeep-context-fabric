name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  memory-server:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ["22", "24", "26"]
    defaults:
      run:
        working-directory: mcp-memory-server
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: mcp-memory-server/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test

  repository:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The public-safety guard scans the complete commit-message history.
          fetch-depth: 0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"
          cache: npm
      - run: npm ci
      - run: npm run check:public
      - run: npm pack --dry-run --ignore-scripts

  # macOS ships bash 3.2; `#!/usr/bin/env bash` picks it up. Run the sync scripts
  # under a real bash 3.2 (container) so bash-4-only regressions fail here, not on
  # a contributor's Mac. CI runs on bash 5, so nothing else catches this.
  shell-portability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: scripts/smoke-bash32.sh   # ubuntu-latest has docker preinstalled

  # Install the packed tarball on a clean, minimal node:22 box (the engines floor)
  # and boot the server — catches missing `files` entries, an unbuilt dist, deps
  # that don't resolve under a global install, and a server that won't start.
  server-boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Build + pack
        run: |
          npm --prefix mcp-memory-server ci
          npm --prefix mcp-memory-server run build
          npm pack
      - name: Global install + boot on a clean node:22-slim container
        run: |
          docker run --rm -v "$PWD":/w -w /w node:22-slim bash -c '
            set -e
            npm i -g ./cairnkeep-cli-*.tgz
            cairn version
            cairn doctor
            scripts/smoke-mcp-boot.sh
          '

  # The highest-fidelity fresh-system check: GitHub's macOS runners are real macOS
  # with bash 3.2 — the exact environment a contributor hit. Force /bin/bash first
  # on PATH so `env bash` resolves to 3.2, then run the documented install verbatim.
  fresh-install-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22"
      - name: Install per the README on real macOS bash 3.2
        run: |
          export PATH="/bin:$PATH"          # make `env bash` pick macOS's 3.2
          bash --version | head -1
          npm --prefix mcp-memory-server ci
          npm --prefix mcp-memory-server run build
          npm pack
          npm i -g ./cairnkeep-cli-*.tgz
          cairn version
          cairn sync --apply --live-root "$RUNNER_TEMP/claude"
          mkdir -p "$RUNNER_TEMP/proj"
          cairn bootstrap "$RUNNER_TEMP/proj"
          ( cd "$RUNNER_TEMP/proj" && cairn doctor )
          scripts/smoke-mcp-boot.sh
